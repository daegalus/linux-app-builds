name: Build Emacs with PGTK

on:
  workflow_dispatch:
    inputs:
      emacs_version:
        description: 'Emacs version to build (e.g., 29.4, 30.2)'
        required: false
        default: '30.2'
        type: string
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

env:
  EMACS_VERSION: ${{ github.event.inputs.emacs_version || '30.2' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

jobs:
  build-emacs-pgtk:
    name: Build Emacs PGTK
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'alpine-linux-musl'
            container: 'alpine:latest'
            static: false
            arch: 'amd64'
            runner: 'ubuntu-latest'
          - name: 'ubuntu-lts'
            container: 'ubuntu:24.04'
            static: false
            arch: 'amd64'
            runner: 'ubuntu-latest'
          - name: 'ubuntu-lts'
            container: 'ubuntu:24.04'
            static: false
            arch: 'arm64'
            runner: 'ubuntu-24.04-arm'
          - name: 'fedora-latest'
            container: 'fedora:latest'
            static: false
            arch: 'amd64'
            runner: 'ubuntu-latest'
          - name: 'fedora-latest'
            container: 'fedora:latest'
            static: false
            arch: 'arm64'
            runner: 'ubuntu-24.04-arm'

    container:
      image: ${{ matrix.container }}
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Alpine)
        if: contains(matrix.container, 'alpine')
        run: |
          apk update
          apk add --no-cache \
            build-base \
            autoconf \
            automake \
            pkgconfig \
            texinfo \
            gnutls-dev \
            jansson-dev \
            libxml2-dev \
            ncurses-dev \
            zlib-dev \
            sqlite-dev \
            tree-sitter-dev \
            cairo-dev \
            pango-dev \
            gtk+3.0-dev \
            librsvg-dev \
            giflib-dev \
            libjpeg-turbo-dev \
            libpng-dev \
            tiff-dev \
            libwebp-dev \
            harfbuzz-dev \
            freetype-dev \
            fontconfig-dev \
            libgccjit-dev \
            dbus-dev \
            gpm-dev \
            wget \
            tar \
            xz \
            git

      - name: Install dependencies (Ubuntu)
        if: contains(matrix.container, 'ubuntu')
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            gcc-12 \
            g++-12 \
            autoconf \
            automake \
            pkg-config \
            texinfo \
            libgnutls28-dev \
            libjansson-dev \
            libxml2-dev \
            libncurses-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libtree-sitter-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libgif-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libwebp-dev \
            libgccjit-12-dev \
            gcc-12-base \
            libharfbuzz-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libgpm-dev \
            wget \
            tar \
            xz-utils \
            git
          # Set gcc-12 as default
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100

      - name: Install dependencies (Fedora)
        if: contains(matrix.container, 'fedora')
        run: |
          dnf update -y
          dnf install -y \
            gcc \
            gcc-c++ \
            make \
            autoconf \
            automake \
            pkgconfig \
            texinfo \
            gnutls-devel \
            jansson-devel \
            libxml2-devel \
            ncurses-devel \
            zlib-devel \
            sqlite-devel \
            libtree-sitter-devel \
            cairo-devel \
            pango-devel \
            gtk3-devel \
            librsvg2-devel \
            giflib-devel \
            libjpeg-turbo-devel \
            libpng-devel \
            libtiff-devel \
            libwebp-devel \
            libgccjit-devel \
            harfbuzz-devel \
            freetype-devel \
            fontconfig-devel \
            dbus-devel \
            gpm-devel \
            wget \
            tar \
            xz \
            git

      - name: Cache Emacs source
        uses: actions/cache@v3
        id: cache-emacs-source
        with:
          path: emacs-${{ env.EMACS_VERSION }}
          key: emacs-source-${{ env.EMACS_VERSION }}

      - name: Download Emacs source
        if: steps.cache-emacs-source.outputs.cache-hit != 'true'
        run: |
          wget -O emacs-${{ env.EMACS_VERSION }}.tar.xz \
            "https://ftpmirror.gnu.org/gnu/emacs/emacs-${{ env.EMACS_VERSION }}.tar.xz"
          tar -xf emacs-${{ env.EMACS_VERSION }}.tar.xz

      - name: Configure build environment
        run: |
          cd emacs-${{ env.EMACS_VERSION }}

          # Base configuration options
          CONFIGURE_OPTS=""
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-pgtk"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-native-compilation=aot"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-tree-sitter"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-json"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-xml2"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-gnutls"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-sqlite3"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-cairo"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-rsvg"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-jpeg"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-png"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-gif"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-tiff"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-webp"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-harfbuzz"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-dbus"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-gpm=no"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-modules"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --with-xpm"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --without-x"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --without-xaw3d"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --without-xim"
          CONFIGURE_OPTS="$CONFIGURE_OPTS --disable-silent-rules"

          # Debug vs Release configuration
          if [ "${{ env.BUILD_TYPE }}" = "debug" ]; then
            CONFIGURE_OPTS="$CONFIGURE_OPTS --enable-checking=all"
            CONFIGURE_OPTS="$CONFIGURE_OPTS --enable-check-lisp-object-type"
            export CFLAGS="$CFLAGS -g3 -O0"
          else
            export CFLAGS="$CFLAGS -O2 -DNDEBUG"
          fi

          # Use a placeholder prefix that won't exist on any system
          # The environment variables in run-emacs.sh will override these paths at runtime
          CONFIGURE_OPTS="$CONFIGURE_OPTS --prefix=/@@EMACS_PORTABLE@@"

          echo "CONFIGURE_OPTS=$CONFIGURE_OPTS" >> $GITHUB_ENV
          echo "Configure options: $CONFIGURE_OPTS"

      - name: Build Emacs
        run: |
          cd emacs-${{ env.EMACS_VERSION }}

          # Configure
          echo "Configuring Emacs with options: $CONFIGURE_OPTS"
          ./configure $CONFIGURE_OPTS

          # Build
          echo "Building Emacs..."
          make -j$(nproc) V=1

          # Install to temporary directory
          echo "Installing Emacs..."
          make install DESTDIR=$PWD/install-root

      # - name: Test basic functionality
      #   run: |
      #     cd emacs-${{ env.EMACS_VERSION }}

      #     # Test that Emacs starts and has PGTK support
      #     echo "Testing Emacs functionality..."
      #     timeout 30 ./install-root/usr/local/bin/emacs --batch \
      #       --eval "(progn
      #                (message \"Emacs version: %s\" (emacs-version))
      #                (message \"System configuration: %s\" system-configuration)
      #                (message \"Window system: %s\" (if (fboundp 'pgtk-backend-display-class) 'pgtk 'none))
      #                (message \"Native compilation: %s\" (if (and (fboundp 'native-comp-available-p) (native-comp-available-p)) 'available 'not-available))
      #                (message \"Tree-sitter: %s\" (if (fboundp 'treesit-available-p) (if (treesit-available-p) 'available 'not-available) 'not-compiled))
      #                (kill-emacs 0))"

      - name: Create distribution package
        run: |
          cd emacs-${{ env.EMACS_VERSION }}

          # Clean up any old tar.gz files from previous runs
          rm -f *.tar.gz

          # Create package directory structure
          PACKAGE_NAME="emacs-pgtk-${{ env.EMACS_VERSION }}-${{ matrix.name }}-${{ matrix.arch }}"

          mkdir -p "$PACKAGE_NAME"
          cp -r install-root/@@EMACS_PORTABLE@@/* "$PACKAGE_NAME/"

          # Compile gsettings schemas
          if [ -d "$PACKAGE_NAME/share/glib-2.0/schemas" ]; then
            echo "Compiling gsettings schemas..."
            glib-compile-schemas "$PACKAGE_NAME/share/glib-2.0/schemas"
          fi

          # Create package info
          cat > "$PACKAGE_NAME/PACKAGE_INFO.txt" << EOF
          Emacs PGTK Build Information
          ============================

          Version: ${{ env.EMACS_VERSION }}
          Build Type: ${{ env.BUILD_TYPE }}
          Distribution: ${{ matrix.name }}
          Architecture: ${{ matrix.arch }}
          Container: ${{ matrix.container }}
          Static Build: ${{ matrix.static }}
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Git Commit: ${{ github.sha }}

          Features:
          - PGTK (Pure GTK) support
          - Native compilation (AOT)
          - Tree-sitter support
          - JSON support
          - XML2 support
          - GnuTLS support
          - SQLite3 support
          - Cairo graphics
          - Image format support (JPEG, PNG, GIF, TIFF, WebP, SVG)

          Configuration:
          $CONFIGURE_OPTS
          EOF

          # Create startup script
          cat > "$PACKAGE_NAME/run-emacs.sh" << 'EOF'
          #!/bin/bash
          # Emacs PGTK startup script

          # Get script directory without following symlinks
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          # If this script was moved to a bin/ directory (e.g., by a package manager),
          # assume the package root is the parent directory
          if [[ "$(basename "$SCRIPT_DIR")" == "bin" ]] && [ ! -d "$SCRIPT_DIR/bin" ]; then
            SCRIPT_DIR="$(dirname "$SCRIPT_DIR")"
          fi

          # Find emacs binary (look for versioned binary first, then fall back to generic)
          EMACS_BIN=""
          if [ -d "$SCRIPT_DIR/bin" ]; then
            # Look for emacs-* first (versioned)
            for f in "$SCRIPT_DIR/bin/emacs-"*; do
              if [ -x "$f" ] && [ ! -d "$f" ]; then
                EMACS_BIN="$f"
                break
              fi
            done
            # Fall back to generic emacs
            if [ -z "$EMACS_BIN" ] && [ -x "$SCRIPT_DIR/bin/emacs" ]; then
              EMACS_BIN="$SCRIPT_DIR/bin/emacs"
            fi
          fi

          if [ -z "$EMACS_BIN" ] || [ ! -f "$EMACS_BIN" ]; then
            echo "Error: Cannot find emacs binary in $SCRIPT_DIR/bin/"
            echo ""
            echo "This script should be run from the extracted package directory."
            echo "If using a package manager, ensure the entire package structure is preserved."
            exit 1
          fi

          # Set up environment
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
          export PATH="$SCRIPT_DIR/bin:$PATH"
          
          # Dynamically find Emacs version directory
          EMACS_VERSION_DIR=""
          if [ -d "$SCRIPT_DIR/share/emacs" ]; then
            EMACS_VERSION_DIR=$(ls -1 "$SCRIPT_DIR/share/emacs" | grep -E '^[0-9]+\.[0-9]+' | head -n1)
          fi
          
          # Override hardcoded prefix paths to use the actual package location
          if [ -n "$EMACS_VERSION_DIR" ] && [ -d "$SCRIPT_DIR/share/emacs/$EMACS_VERSION_DIR" ]; then
            export EMACSLOADPATH="$SCRIPT_DIR/share/emacs/$EMACS_VERSION_DIR/lisp:"
            export EMACSDATA="$SCRIPT_DIR/share/emacs/$EMACS_VERSION_DIR/etc"
            export EMACSDOC="$SCRIPT_DIR/share/emacs/$EMACS_VERSION_DIR/etc"
          fi
          
          if [ -n "$EMACS_VERSION_DIR" ] && [ -d "$SCRIPT_DIR/lib/emacs/$EMACS_VERSION_DIR" ]; then
            export EMACSNATIVELOADPATH="$SCRIPT_DIR/lib/emacs/$EMACS_VERSION_DIR/native-lisp:"
          fi
          
          export GSETTINGS_SCHEMA_DIR="$SCRIPT_DIR/share/glib-2.0/schemas"

          # Add Homebrew paths if they exist (for systems like immutable distros)
          if [ -d "/home/linuxbrew/.linuxbrew/lib" ]; then
            export LD_LIBRARY_PATH="/home/linuxbrew/.linuxbrew/lib:$LD_LIBRARY_PATH"
          fi

          # Ensure DISPLAY is set for Wayland/X11
          if [ -z "$DISPLAY" ] && [ -n "$WAYLAND_DISPLAY" ]; then
              export DISPLAY=:0
          fi

          # Run Emacs
          exec "$EMACS_BIN" "$@"
          EOF
          chmod +x "$PACKAGE_NAME/run-emacs.sh"

          # Create archive
          tar -czf "$PACKAGE_NAME.tar.gz" "$PACKAGE_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emacs-pgtk-${{ env.EMACS_VERSION }}-${{ matrix.name }}-${{ matrix.arch }}
          path: emacs-${{ env.EMACS_VERSION }}/*.tar.gz
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.name }}-${{ matrix.arch }}
          path: |
            emacs-${{ env.EMACS_VERSION }}/config.log
            emacs-${{ env.EMACS_VERSION }}/src/config.h
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-emacs-pgtk
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: emacs-pgtk-*

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: emacs-pgtk-${{ env.EMACS_VERSION }}-${{ github.run_number }}
          name: Emacs PGTK ${{ env.EMACS_VERSION }} Build ${{ github.run_number }}
          body: |
            # Emacs PGTK Build ${{ env.EMACS_VERSION }}

            This release contains distribution-agnostic builds of Emacs ${{ env.EMACS_VERSION }} with PGTK support.

            ## Features
            - **PGTK (Pure GTK)** - Native Wayland and X11 support
            - **Native Compilation (AOT)** - Faster Elisp execution
            - **Tree-sitter** - Modern syntax highlighting and parsing
            - **Modern image support** - JPEG, PNG, GIF, TIFF, WebP, SVG
            - **Network security** - GnuTLS support
            - **Database support** - SQLite3 integration

            ## Available Builds
            Each distribution is available for both amd64 and arm64 architectures:
            - **Alpine Linux (musl)** - musl-based, minimal dependencies
            - **Ubuntu LTS** - Dynamic build, broad compatibility
            - **Fedora Latest** - Dynamic build, latest libraries

            ## Usage
            1. Download the appropriate build for your system
            2. Extract: `tar -xzf emacs-pgtk-*.tar.gz`
            3. Run: `./emacs-pgtk-*/run-emacs.sh`

            Built from commit: ${{ github.sha }}
          files: artifacts/*/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
